name: Release

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build:
    name: Build release asset
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm install
      - run: npm run lint
      - run: npm run build
      - name: Copy built card to root
        run: cp dist/indego-calendar-card.js indego-calendar-card.js
      - name: Upload card to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: indego-calendar-card.js
          overwrite_files: true
